<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>J. Bell Price</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #6f8f7a;
      --bg: #f8f7f5;
      --text: #1a1a1a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    h1, h2, h3 {
      font-family: 'Cormorant Garamond', serif;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px;
    }

    .hero {
      text-align: center;
      padding: 100px 20px 80px;
    }

    .hero h1 { font-size: 3rem; }
    .hero p { margin: 20px 0; color: #555; }

    .hero a {
      border: 1px solid var(--accent);
      padding: 10px 20px;
    }

    .featured {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .card:hover img { transform: scale(1.05); }

    .overlay {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
      color: white;
    }

    .themes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      margin-top: 60px;
    }

    .theme {
      border: 1px solid #ddd;
      padding: 20px;
      text-align: center;
      cursor: pointer;
    }

    .about {
      margin-top: 80px;
      text-align: center;
      max-width: 600px;
      margin-inline: auto;
    }

    .error {
      color: red;
      text-align: center;
      margin-top: 40px;
    }

    @media (max-width: 768px) {
      .featured { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

<section class="hero">
  <h1>J. Bell Price</h1>
  <p>Poetry, art, and quiet explorations of grief, love, and becoming.</p>
  <a href="#featured">Enter the Work</a>
</section>

<div class="container">

  <section id="featured" class="featured">
    <div id="featured-main"></div>
    <div id="featured-side" style="display:grid; gap:20px;"></div>
  </section>

  <section id="themes" class="themes"></section>

  <div id="error" class="error"></div>

  <section class="about">
    <p>
      Scientist by day, poet by instinct. I write about what lingers—
      the quiet spaces between loss, love, and becoming.
    </p>
  </section>

</div>

<script>
async function loadContent() {
  try {
    const res = await fetch("./data/content.json");

    if (!res.ok) {
      throw new Error("Failed to load JSON (status " + res.status + ")");
    }

    const text = await res.text();

    let items;
    try {
      items = JSON.parse(text);
    } catch (e) {
      console.error("Invalid JSON:", text);
      throw new Error("content.json is not valid JSON");
    }

    if (!Array.isArray(items)) {
      throw new Error("JSON must be an array of items");
    }

    initPage(items);

  } catch (err) {
    console.error(err);
    document.getElementById("error").textContent = "Error loading content: " + err.message;
  }
}

function initPage(items) {
  items.sort((a, b) => new Date(b.date) - new Date(a.date));

  const main = document.getElementById("featured-main");
  const side = document.getElementById("featured-side");

  const featured = items.slice(0, 3);

  if (featured[0]) {
    main.innerHTML = createCard(featured[0], true);
  }

  featured.slice(1).forEach(item => {
    side.innerHTML += createCard(item, false);
  });

  const themesContainer = document.getElementById("themes");
  const themes = [...new Set(items.flatMap(i => Array.isArray(i.themes) ? i.themes : []))];

  themes.forEach(theme => {
    const div = document.createElement("div");
    div.className = "theme";
    div.textContent = theme;
    div.onclick = () => {
      window.location.href = `/themes.html?theme=${encodeURIComponent(theme)}`;
    };
    themesContainer.appendChild(div);
  });
}

function createCard(item, large) {
  return `
    <a href="${item.url || '#'}" class="card" style="height:${large ? '400px' : '190px'}">
      <img src="${item.image || ''}" alt="">
      <div class="overlay">
        <h2>${item.title || 'Untitled'}</h2>
      </div>
    </a>
  `;
}

// RUN
loadContent();
</script>

</body>
</html>
