<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop | J. Bell Price</title>

  <!-- Shared typography so the shop matches the rest of the site -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Shared site stylesheet -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- NAVIGATION -->
  <nav class="nav">
    <div class="container nav-inner">
      <div class="logo">J. BELL PRICE</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="shop.html" class="active">Shop</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </nav>

  <!-- SHOP INTRO -->
  <section class="hero shop-hero">
    <div class="container shop-header">
      <div class="kicker">Shop</div>
      <h1>Selected works, prints, and objects.</h1>
      <p>
        Each piece extends the archive in another form — printed, held, collected,
        or carried into domestic space.
      </p>
    </div>
  </section>

  <!-- PRODUCT GRID: generated from data/products.json -->
  <section class="section">
    <div class="container">
      <div id="shop-grid" class="shop-grid"></div>
      <div id="shop-error" class="error"></div>
    </div>
  </section>

  <!-- CLOSING NOTE -->
  <section class="section alt">
    <div class="container narrow-copy about-endnote">
      <p>
        Editions, prints, and small objects appear here as they become available.
      </p>
    </div>
  </section>

  <script>
    // Loads product information from data/products.json so the shop can be updated
    // without changing this HTML file.
    async function loadProducts() {
      const grid = document.getElementById('shop-grid');
      const error = document.getElementById('shop-error');
      if (!grid) return;

      try {
        const res = await fetch('./data/products.json');
        if (!res.ok) throw new Error('Failed to load products.json');

        const products = await res.json();
        if (!Array.isArray(products)) throw new Error('products.json must be an array');

        if (products.length === 0) {
          grid.innerHTML = `
            <div class="card shop-empty">
              <div class="tag">Shop</div>
              <p>No shop items are available yet.</p>
            </div>
          `;
          return;
        }

        products.forEach(product => {
          grid.appendChild(createProductCard(product));
        });
      } catch (err) {
        console.error(err);
        if (error) error.textContent = err.message;
      }
    }

    // Creates one product card using safe fallbacks for missing fields.
    function createProductCard(product) {
      const article = document.createElement('article');
      article.className = 'product card';

      const title = product.title || 'Untitled item';
      const description = product.description || '';
      const image = product.image || '';
      const price = product.price || '';
      const category = product.category || 'Item';
      const link = product.link || '#';
      const status = product.status || '';
      const buttonText = product.buttonText || 'View';

      article.innerHTML = `
        <a href="${link}" class="product-image-link" aria-label="View ${escapeHTML(title)}">
          <div class="product-image">
            ${image
              ? `<img src="${image}" alt="${escapeHTML(title)}" />`
              : `<div class="product-image-placeholder">Image coming soon</div>`
            }
          </div>
        </a>

        <div class="product-content">
          <div class="tag">${escapeHTML(category)}</div>
          <h2 class="product-title">${escapeHTML(title)}</h2>
          <p class="product-desc">${escapeHTML(description)}</p>

          <div class="product-meta">
            <div>
              ${price ? `<div class="price">${escapeHTML(price)}</div>` : ''}
              ${status ? `<div class="product-status">${escapeHTML(status)}</div>` : ''}
            </div>
            <a class="button product-button" href="${link}">${escapeHTML(buttonText)}</a>
          </div>
        </div>
      `;

      return article;
    }

    // Escapes product text before inserting it into the page.
    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    loadProducts();
  </script>
</body>
</html>
